<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OLL Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #E8E1D0; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; box-sizing: border-box;
    /* subtle grain */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015), transparent 55%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02), transparent 55%);
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  button:active { transform: scale(0.98); }
  input:focus { border-color: #8C5A2B !important; }
  /* scrollbar hide inside frame */
  *::-webkit-scrollbar { width: 0; background: transparent; }
  @media (max-width: 600px) {
    body { padding: 0; background: #F4EFE3; }
    .frame-wrap { transform: none !important; }
  }
</style>
</head>
<body>

<div id="root" class="frame-wrap"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/srs.jsx"></script>
<script type="text/babel" src="src/seed.jsx"></script>
<script type="text/babel" src="src/diagram.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/logo.jsx"></script>
<script type="text/babel" src="src/auth-ui.jsx"></script>
<script type="text/babel" src="src/screen-auth.jsx"></script>
<script type="text/babel" src="src/screen-home.jsx"></script>
<script type="text/babel" src="src/screen-practice.jsx"></script>
<script type="text/babel" src="src/screen-cases.jsx"></script>
<script type="text/babel" src="src/screen-detail.jsx"></script>
<script type="text/babel" src="src/screen-stats.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
  function Mount() {
    const [w, setW] = React.useState(window.innerWidth);
    React.useEffect(() => {
      const h = () => setW(window.innerWidth);
      window.addEventListener('resize', h);
      return () => window.removeEventListener('resize', h);
    }, []);
    const isMobile = w < 600;
    if (isMobile) {
      return (
        <div style={{ width: '100vw', height: '100vh', background: paper.bg }}>
          <App />
        </div>
      );
    }
    return (
      <IOSDevice width={402} height={874}>
        <App />
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Mount />);
</script>
</body>
</html>
